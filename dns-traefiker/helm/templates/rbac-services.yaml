apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dns-traefiker.fullname" . }}-services-viewer
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dns-traefiker.fullname" . }}-services-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dns-traefiker.fullname" . }}-services-viewer
subjects:
  - kind: ServiceAccount
    name: {{ include "dns-traefiker.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
