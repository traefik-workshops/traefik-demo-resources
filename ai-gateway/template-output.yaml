# Source: ai-gateway/templates/shared-middlewares.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: release-name-ai-gateway-topic-control
  labels:
    helm.sh/chart: ai-gateway-0.1.0
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  plugin:
    chat-completion-llm-guard:
      endpoint: https://topic-control-nim/v1/chat/completions
      model: nvidia/llama-3.1-nemoguard-8b-topic-control
      sendReasonAsError: true
      request:
        promptTemplate: '{"inputs": "{{ (index .messages (sub (len .messages) 1)).content }}"}'
        blockConditions:
          - condition: Contains("off-topic")
            reason: off-topic detected
        systemPrompt: |
          You are a topic control agent. Determine if the user question is about PROHIBITED or ALLOWED topics.
          ...
---
# Source: ai-gateway/templates/shared-middlewares.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: release-name-ai-gateway-content-safety
  labels:
    helm.sh/chart: ai-gateway-0.1.0
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  plugin:
    chat-completion-llm-guard:
      endpoint: https://content-safety-nim/v1/chat/completions
      model: nvidia/llama-3.1-nemoguard-8b-content-safety
      sendReasonAsError: true
      request:
        promptTemplate: '{"inputs": "{{ (index .messages (sub (len .messages) 1)).content }}"}'
        blockConditions:
          - condition: Contains("unsafe")
            reason: unsafe content detected
---
# Source: ai-gateway/templates/shared-middlewares.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: release-name-ai-gateway-jailbreak-detection
  labels:
    helm.sh/chart: ai-gateway-0.1.0
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  plugin:
    chat-completion-llm-guard-custom:
      endpoint: https://jailbreak-detection-nim/v1/classify
      sendReasonAsError: true
      request:
        template: '{"input": "{{ (index .messages (sub (len .messages) 1)).content }}"}'
        blockConditions:
          - reason: "jailbreak detected"
            condition: JSONGt(".score", "0.85")
        traceConditions:
          - reason: "jailbreak detected"
            condition: JSONGt(".score", "0.85")
---
# Source: ai-gateway/templates/shared-middlewares.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: release-name-ai-gateway-content-guard
  labels:
    helm.sh/chart: ai-gateway-0.1.0
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  plugin:
    chat-completion-content-guard:
      engine:
        presidio:
          host: presidio
          language: en
      response:
        rules:
          - entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
            mask:
              char: '#'
              unmaskFromRight: 3
