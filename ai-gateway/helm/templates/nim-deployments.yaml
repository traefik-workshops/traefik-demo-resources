{{- if .Values.enabled }}
{{- if include "ai-gateway.mc.isLocalDeploy" . }}
{{- if .Values.nims.enabled }}
{{- range .Values.nims.types }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    nim: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: nim
          image: "{{ .image }}:{{ .tag | default "latest" }}"
          env:
            - name: NGC_API_KEY
              value: {{ $.Values.nims.ngcToken | quote }}
          ports:
            - containerPort: 8000
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ .name }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
