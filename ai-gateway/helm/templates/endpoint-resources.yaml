{{- if .Values.enabled }}
{{- $isParent := include "ai-gateway.mc.isParentMode" . -}}
{{- $isChild := include "ai-gateway.mc.isChildDeploy" . -}}
{{- range .Values.endpoints }}
{{- if (default true .enabled) }}
{{- $endpointName := .name }}
{{- $fullName := printf "%s-%s" (include "ai-gateway.fullname" $) $endpointName }}
{{- $routing := .routing }}
{{- $endpointMiddlewares := .middlewares }}
{{- $isExternal := .backend.isExternal }}
{{- $backendUrl := .backend.url }}
{{- $isLocal := include "ai-gateway.mc.isLocalDeploy" $ }}
{{- if $isLocal }}
{{- if $isExternal }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    endpoint: {{ $endpointName }}
spec:
  type: ExternalName
  externalName: {{ $backendUrl }}
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullName }}-cc
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    endpoint: {{ $endpointName }}
spec:
  plugin:
    chat-completion:
      model: {{ .chatCompletion.model }}
      {{- if .chatCompletion.params }}
      {{- toYaml .chatCompletion.params | nindent 6 }}
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullName }}-headers
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    endpoint: {{ $endpointName }}
spec:
  headers:
    customRequestHeaders:
      {{- range $k, $v := .headers }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}-route
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    endpoint: {{ $endpointName }}
  {{- $uplinkAnnotation := include "ai-gateway.mc.uplinkAnnotation" $ }}
  {{- if $uplinkAnnotation }}
  annotations:
    {{ $uplinkAnnotation }}
  {{- end }}
spec:
  routes:
    - kind: Rule
      match: {{ include "ai-gateway.mc.routeMatch" (dict "root" $ "host" $routing.host "endpointName" $endpointName "path" "/v1/chat/completions") }}
      services:
        - name: {{ if $isExternal }}{{ $fullName }}{{ else }}{{ $backendUrl }}{{ end }}
          port: 443
          scheme: https
          passHostHeader: false
      middlewares:
        - name: {{ $fullName }}-headers
        {{- range $endpointMiddlewares }}
        - name: {{ if (has . (keys $.Values.sharedMiddlewares)) }}{{ include "ai-gateway.fullname" $ }}-{{ . | kebabcase }}{{ else }}{{ include "ai-gateway.fullname" $ }}-{{ $endpointName }}-{{ . | kebabcase }}{{ end }}
        {{- end }}
    - kind: Rule
      match: {{ include "ai-gateway.mc.routeMatch" (dict "root" $ "host" $routing.host "endpointName" $endpointName "path" "") }}
      services:
        - name: {{ if $isExternal }}{{ $fullName }}{{ else }}{{ $backendUrl }}{{ end }}
          port: 443
          scheme: https
          passHostHeader: false
      middlewares:
        - name: {{ $fullName }}-headers
{{- end }}{{/* not multicluster parent */}}
{{- if $isParent }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: {{ $fullName }}-api
  labels:
    {{- include "ai-gateway.labels" $ | nindent 4 }}
    endpoint: {{ $endpointName }}
spec:
  title: {{ .api.title | quote }}
  description: {{ .api.description | quote }}
  openApiSpec:
    url: {{ .api.oasUrl }}
    override:
      servers:
        - url: https://{{ $routing.host }}.{{ ($.Values.global).domain | default $.Values.domain }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
