apiVersion: v2
name: ai-gateway
description: A generic AI Gateway Helm chart for Traefik Hub
type: application
version: 0.3.3
appVersion: "1.0.0"

dependencies:
  - name: presidio
    version: 0.2.3
    repository: "file://../../presidio/helm"
    condition: sharedMiddlewares.contentGuardPresidio.enabled
  - name: weaviate
    version: 17.6.1
    repository: "https://weaviate.github.io/weaviate-helm"
    condition: sharedMiddlewares.semanticCache.enabled
  - name: embeddings
    version: 0.1.0
    repository: "file://../../embeddings/helm"
    condition: sharedMiddlewares.semanticCache.enabled
