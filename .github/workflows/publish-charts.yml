name: Publish Helm Charts to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0)"
        required: true

jobs:
  publish-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing charts with version: $VERSION"

      - name: Package and Push Helm Charts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # List of all charts to publish
          charts=(
            "ai-gateway/helm"
            "airlines/helm"
            "chats/helm"
            "dns-traefiker/helm"
            "gov/helm"
            "higher-ed/helm"
            "presidio/helm"
          )

          echo "Packaging and publishing charts..."
          for chart in "${charts[@]}"; do
            chart_name=$(basename $(dirname $chart))
            echo "Processing $chart_name..."
            
            # Package the chart
            helm package $chart --version $VERSION --app-version $VERSION
            
            # Get the package filename
            package_file="${chart_name}-helm-${VERSION}.tgz"
            
            # Push to GitHub Container Registry
            echo "Pushing $package_file to ghcr.io/traefik-workshops..."
            helm push $package_file oci://ghcr.io/traefik-workshops
            
            echo "✓ Published $chart_name version $VERSION"
          done

          echo ""
          echo "All charts published successfully!"
          echo "Charts are available at: oci://ghcr.io/traefik-workshops/<chart-name>-helm:$VERSION"
