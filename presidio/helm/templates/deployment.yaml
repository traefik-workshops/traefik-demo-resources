{{- if include "presidio.mc.isLocalDeploy" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "presidio.fullname" . }}
  labels:
    {{- include "presidio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "presidio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "presidio.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: presidio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
