{{/*
  OPTIONS preflight IngressRoutes — no Hub annotation so Hub auth is bypassed.
  priority: 1000 ensures these win over the default-priority Hub-annotated versioned routes.
*/}}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-preflight-headers
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  headers:
    accessControlAllowOriginList:
      - "*"
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
    accessControlMaxAge: 86400

# ── Flight Operations ──────────────────────────────────────────────────────────
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-options-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      priority: 1000
      match: {{ include "airlines.flights.hostMatch" . }} && Method(`OPTIONS`)
      middlewares:
        - name: cors-preflight-headers
      services:
        - name: flights-app
          port: 3000
