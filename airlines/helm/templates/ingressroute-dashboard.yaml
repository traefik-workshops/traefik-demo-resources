
{{- if .Values.traefikDashboard.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`traefik.{{ include "airlines.domain" . }}`)
      services:
        - name: api@internal
          kind: TraefikService
{{- end }}
