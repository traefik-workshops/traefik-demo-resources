{{- $hasLocalOpsGroup := or
  (include "airlines.mc.isLocalDeploy" (dict "root" . "group" "flightOps"))
  (include "airlines.mc.isLocalDeploy" (dict "root" . "group" "passengerSvc"))
  (include "airlines.mc.isLocalDeploy" (dict "root" . "group" "airportOps")) -}}
{{- if $hasLocalOpsGroup }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-version-v1
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /v1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-version-v2
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /v2

{{- end }}
