{{/*
  Uplink CRDs — one per enabled child group.
  Rendered in child mode only. Each exposes a named uplink that the parent
  cluster references as <exposeName>@<providerName>.
*/}}
{{- $mc := .Values.multicluster -}}
{{- if and $mc.enabled (eq $mc.mode "child") -}}

{{- if index $mc.child.groups "flightOps" }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: Uplink
metadata:
  name: {{ index $mc.child.uplinkEntryPoints "flightOps" }}
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: uplink
spec:
  exposeName: {{ index $mc.child.uplinkEntryPoints "flightOps" }}
{{- end }}

{{- if index $mc.child.groups "flightOpsMcp" }}
