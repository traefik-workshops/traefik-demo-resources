{{/*
  WRR TraefikService resources for HA routing.
  Rendered in parent mode when the group is assigned to a remote provider.
  Weights: local=3 (75%), remote=1 (25%).

  The remote leg uses kind: TraefikService with the internal @multicluster service name
  (format: <exposeName>-<providerKey>@multicluster). The local leg is a plain K8s service.

  Three HA services: flights-ha (flightOps), bookings-ha (passengerSvc), checkin-ha (airportOps).
  Other APIs in each group route directly to the uplink (no WRR).
*/}}
{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "flightOps") }}
{{- $ep := index .Values.global.multicluster.child.uplinkEntryPoints "flightOps" }}
{{- $provider := index .Values.global.multicluster.parent.groups "flightOps" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-local-flights
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /flights/v1
      - /flights/v2
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: flights-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
spec:
  weighted:
    services:
      - name: flights-app
        namespace: {{ .Release.Namespace }}
        port: 3000
        weight: 3
        middlewares:
          - name: stripprefix-local-flights
      - kind: TraefikService
        name: {{ $ep }}@multicluster
        weight: 1
        middlewares:
          - name: addprefix-flights
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "passengerSvc") }}
{{- $ep := index .Values.global.multicluster.child.uplinkEntryPoints "passengerSvc" }}
{{- $provider := index .Values.global.multicluster.parent.groups "passengerSvc" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-local-bookings
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /bookings/v1
      - /bookings/v2
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: bookings-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
spec:
  weighted:
    services:
      - name: bookings-app
        namespace: {{ .Release.Namespace }}
        port: 3000
        weight: 3
        middlewares:
          - name: stripprefix-local-bookings
      - kind: TraefikService
        name: {{ $ep }}@multicluster
        weight: 1
        middlewares:
          - name: addprefix-bookings
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "airportOps") }}
{{- $ep := index .Values.global.multicluster.child.uplinkEntryPoints "airportOps" }}
{{- $provider := index .Values.global.multicluster.parent.groups "airportOps" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-local-checkin
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /checkin/v1
      - /checkin/v2
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: checkin-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
spec:
  weighted:
    services:
      - name: checkin-app
        namespace: {{ .Release.Namespace }}
        port: 3000
        weight: 3
        middlewares:
          - name: stripprefix-local-checkin
      - kind: TraefikService
        name: {{ $ep }}@multicluster
        weight: 1
        middlewares:
          - name: addprefix-checkin
{{- end }}
