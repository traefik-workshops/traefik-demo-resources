{{/*
  WRR TraefikService resources for HA routing.
  Rendered in parent mode when the group is assigned to a remote provider.
  Weights: local=3 (75%), remote=1 (25%).

  Pattern: wrap the local K8s service in its own TraefikService (-local),
  then reference both legs with kind: TraefikService in the WRR so that
  Traefik resolves both entries through the same service resolution path.

  Three HA pairs: flights-ha (flightOps), bookings-ha (passengerSvc), checkin-ha (airportOps).
  Other APIs in each group route directly to the uplink (no WRR).
*/}}
{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "flightOps") }}
{{- $ep := index .Values.multicluster.child.uplinkEntryPoints "flightOps" }}
{{- $provider := index .Values.multicluster.groups "flightOps" }}
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: flights-local
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
spec:
  weighted:
    services:
      - name: flights-app
        port: 3000
        weight: 1
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: flights-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
spec:
  weighted:
    services:
      - kind: TraefikService
        name: flights-local
        weight: 3
      - name: {{ $ep }}@{{ $provider }}
        weight: 1
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "passengerSvc") }}
{{- $ep := index .Values.multicluster.child.uplinkEntryPoints "passengerSvc" }}
{{- $provider := index .Values.multicluster.groups "passengerSvc" }}
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: bookings-local
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
spec:
  weighted:
    services:
      - name: bookings-app
        port: 3000
        weight: 1
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
