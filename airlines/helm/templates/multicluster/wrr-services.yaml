  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
spec:
  weighted:
    services:
      - kind: TraefikService
        name: bookings-local
        weight: 3
      - name: {{ $ep }}@{{ $provider }}
        weight: 1
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "airportOps") }}
{{- $ep := index .Values.multicluster.child.uplinkEntryPoints "airportOps" }}
{{- $provider := index .Values.multicluster.groups "airportOps" }}
---
apiVersion: traefik.io/v1alpha1
