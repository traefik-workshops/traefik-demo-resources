{{/*
  WRR TraefikService resources for HA routing.
  Rendered in parent mode when the group is assigned to a remote provider.
  Weights: local=3 (75%), remote=1 (25%).

  Three services: flights-ha (flightOps), bookings-ha (passengerSvc), checkin-ha (airportOps).
  Other APIs in each group route directly to the uplink (no WRR).
*/}}
{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "flightOps") }}
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: flights-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
spec:
  weighted:
    services:
      - name: flights-app
        port: 3000
        weight: 3
      - name: {{ index .Values.multicluster.child.uplinkEntryPoints "flightOps" }}@{{ index .Values.multicluster.groups "flightOps" }}
        weight: 1
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "passengerSvc") }}
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: bookings-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
spec:
  weighted:
    services:
      - name: bookings-app
        port: 3000
        weight: 3
      - name: {{ index .Values.multicluster.child.uplinkEntryPoints "passengerSvc" }}@{{ index .Values.multicluster.groups "passengerSvc" }}
        weight: 1
{{- end }}

{{- if include "airlines.mc.isRemoteGroup" (dict "root" . "group" "airportOps") }}
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: checkin-ha
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
spec:
  weighted:
    services:
      - name: checkin-app
        port: 3000
        weight: 3
      - name: {{ index .Values.multicluster.child.uplinkEntryPoints "airportOps" }}@{{ index .Values.multicluster.groups "airportOps" }}
        weight: 1
{{- end }}
