{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isPassengerSvc := or $isParent (include "airlines.mc.isChildDeploy" (dict "root" . "group" "passengerSvc")) -}}
{{- $mc := .Values.multicluster -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: passenger-svc-dash-nginx-conf
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: passenger-svc-dash
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Passenger Services APIs
        location /api/bookings/      { proxy_pass http://bookings-app:3000/;      proxy_set_header Host $host; }
        location /api/passengers/    { proxy_pass http://passengers-app:3000/;    proxy_set_header Host $host; }
        location /api/notifications/ { proxy_pass http://notifications-app:3000/; proxy_set_header Host $host; }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: passenger-svc-dash-html
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: passenger-svc-dash
data:
  index.html: |
{{ .Files.Get "files/dashboard/passenger-svc.html" | indent 4 }}

{{ include "airlines.dashboardService" (dict "root" . "name" "passenger-svc-dash") }}

{{- if $isParent }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: passenger-svc-dash-oidc
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: passenger-svc-dash
spec:
  plugin:
    oidc:
      issuer: {{ include "airlines.oidc.issuerUrl" . }}
      clientId: "urn:k8s:secret:oidc-credentials:clientId"
      clientSecret: "urn:k8s:secret:oidc-credentials:clientSecret"
      redirectUrl: /oidc/callback
      scopes:
        - openid
        - profile
        - email
        - group
      claims: >-
        Contains(`id_token.group`, `passenger-svc`) ||
        Contains(`id_token.group`, `admins`)
      forwardHeaders:
        X-User-Group: group
        X-User-Email: email
        X-User-Name: preferred_username
      session:
        expiry: 86400
        refresh: true
{{- end }}
{{- if $isPassengerSvc }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: passenger-svc-dash-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: passenger-svc-dash
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "passengerSvc") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.passengerSvcDash.hostMatch" . }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "passenger-svc-dash" "port" 80 "group" "passengerSvc" "haName" "") | nindent 8 }}
      {{- if $isParent }}
      middlewares:
        - name: passenger-svc-dash-oidc
      {{- end }}
{{- end }}
