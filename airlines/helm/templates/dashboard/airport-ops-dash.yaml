{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isAirportOps := or $isParent (include "airlines.mc.isChildDeploy" (dict "root" . "group" "airportOps")) -}}
{{- $mc := .Values.multicluster -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airport-ops-dash-nginx-conf
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: airport-ops-dash
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Airport Operations APIs
        location /api/checkin/  { proxy_pass http://checkin-app:3000/;  proxy_set_header Host $host; }
        location /api/baggage/  { proxy_pass http://baggage-app:3000/;  proxy_set_header Host $host; }
        location /api/gates/    { proxy_pass http://gates-app:3000/;    proxy_set_header Host $host; }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airport-ops-dash-html
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: airport-ops-dash
data:
  index.html: |
{{ .Files.Get "files/dashboard/airport-ops.html" | indent 4 }}

{{ include "airlines.dashboardService" (dict "root" . "name" "airport-ops-dash") }}

{{- if $isParent }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: airport-ops-dash-oidc
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: airport-ops-dash
spec:
  plugin:
    oidc:
      issuer: {{ include "airlines.oidc.issuerUrl" . }}
      clientId: "urn:k8s:secret:oidc-credentials:clientId"
      clientSecret: "urn:k8s:secret:oidc-credentials:clientSecret"
      redirectUrl: /oidc/callback
      scopes:
        - openid
        - profile
        - email
        - group
      claims: >-
        Contains(`id_token.group`, `airport-ops`) ||
        Contains(`id_token.group`, `admins`)
      forwardHeaders:
        X-User-Group: group
        X-User-Email: email
        X-User-Name: preferred_username
      session:
        expiry: 86400
        refresh: true
{{- end }}
{{- if $isAirportOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: airport-ops-dash-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: airport-ops-dash
spec:
  entryPoints:
    {{- include "airlines.mc.entryPoints" (dict "root" . "group" "airportOps") | nindent 4 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.airportOpsDash.hostMatch" . }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "airport-ops-dash" "port" 80 "group" "airportOps" "haName" "") | nindent 8 }}
      {{- if $isParent }}
      middlewares:
        - name: airport-ops-dash-oidc
      {{- end }}
{{- end }}
