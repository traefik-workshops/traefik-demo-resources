---
apiVersion: hub.traefik.io/v1alpha1
kind: APIPlan
metadata:
  name: airlines-access
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  title: "Airlines Access"
  description: "Standard access plan for Airlines APIs"
  rateLimit:
    limit: 100
    period: 1s
  quota:
    limit: 1000
    period: 750h
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIPlan
metadata:
  name: airlines-admins-access
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  title: "Airlines Admin Access"
  description: "Admin access plan for all Airlines APIs"
  rateLimit:
    limit: 10000
    period: 1s
  quota:
    limit: 100000
    period: 750h
{{- $toolGroups := list -}}
{{- range $key, $val := index .Values "tools-access" -}}
  {{- $toolGroups = append $toolGroups $val.group -}}
{{- end -}}
{{- $uniqueToolGroups := $toolGroups | uniq -}}
{{- /* Build effective users-access: inject defaults with deterministic IDs when keycloak is enabled */ -}}
{{- $effectiveUsersAccess := index .Values "users-access" -}}
{{- if .Values.keycloak.enabled -}}
{{- $defaultUsersAccess := list
  (dict "name" "admin"      "group" "admins")
  (dict "name" "dispatcher" "group" "flight-ops")
  (dict "name" "agent"      "group" "passenger-svc")
  (dict "name" "handler"    "group" "airport-ops") -}}
{{- $seenNames := dict -}}
{{- $merged := list -}}
{{- range (concat $defaultUsersAccess $effectiveUsersAccess) -}}
{{- if not (hasKey $seenNames .name) -}}
{{- $merged = append $merged . -}}
{{- $_ := set $seenNames .name true -}}
{{- end -}}
{{- end -}}
{{- $effectiveUsersAccess = $merged -}}
{{- end -}}
{{- range $group := $uniqueToolGroups }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: ManagedApplication
metadata:
  name: {{ $group }}-application
  labels:
    {{- include "airlines.labels" $ | nindent 4 }}
spec:
  appId: {{ $group | quote }}
  owner: {{ $group | quote }}
{{- end }}
{{- range $effectiveUsersAccess }}
{{- $computedId := printf "%s-%s-%s-%s-%s" ((.name | sha256sum) | substr 0 8) ((.name | sha256sum) | substr 8 12) ((.name | sha256sum) | substr 12 16) ((.name | sha256sum) | substr 16 20) ((.name | sha256sum) | substr 20 32) }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: ManagedApplication
metadata:
  name: {{ .name }}-application
  labels:
    {{- include "airlines.labels" $ | nindent 4 }}
spec:
  appId: {{ .group | quote }}
  owner: {{ .id | default $computedId | quote }}
{{- end }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: ManagedSubscription
metadata:
  name: users-subscription
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  managedApplications:
    {{- range $effectiveUsersAccess }}
    - name: {{ .name }}-application
    {{- end }}
  apiBundles:
    - name: flight-ops-bundle
    - name: passenger-svc-bundle
  apiPlan:
    name: airlines-access
  weight: 10
---
apiVersion: hub.traefik.io/v1alpha1
kind: ManagedSubscription
metadata:
  name: admins-subscription
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  managedApplications:
    {{- range $effectiveUsersAccess }}
    {{- if eq .group "admins" }}
    - name: {{ .name }}-application
    {{- end }}
    {{- end }}
    {{- range $group := $uniqueToolGroups }}
    - name: {{ $group }}-application
    {{- end }}
  apiBundles:
    - name: flight-ops-bundle
    - name: passenger-svc-bundle
    - name: airport-ops-bundle
  apiPlan:
    name: airlines-admins-access
  weight: 100

# ── Flight Operations — DELETE restrictions ───────────────────────────────────
---
apiVersion: hub.traefik.io/v1alpha1
kind: ManagedSubscription
metadata:
  name: dispatcher-flights-subscription
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  managedApplications:
    - name: dispatcher-application
  apis:
    - name: flights-api
  apiPlan:
    name: airlines-access
  operationFilter:
    include:
      - read-flights
      - write-flights
