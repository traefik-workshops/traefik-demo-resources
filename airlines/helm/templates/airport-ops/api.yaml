---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: checkin-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
    bundle: airport-ops
spec:
  title: "Check-in API"
  description: "Online check-in, seat selection, and boarding passes for Traefik Airlines"
  openApiSpec:
    path: /openapi.yaml
    override:
      servers:
        - url: {{ include "airlines.checkin.apiUrl" . }}
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "OPTIONS"
    allowCredentials: true
    maxAge: 86400
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: checkin-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
  annotations:
    hub.traefik.io/api: checkin-api
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ include "airlines.checkin.hostMatch" . }}
      services:
        - name: checkin-app
          port: 3000
          passHostHeader: true
      observability:
        traceVerbosity: detailed
