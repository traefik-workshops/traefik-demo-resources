{{/*
  Per-API versioning for Airport Operations APIs.
  v1 = deprecated (deprecation headers, operationSets enforced)
  v2 = current (operationSets on APIVersion, enforced via subscriptions)

  Multicluster:
  - Hub API/APIVersion CRDs: parent mode only
  - Deprecation middlewares: always
  - IngressRoutes: parent mode OR child with airportOps group enabled
*/}}
{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isAirportOps := or $isParent (include "airlines.mc.isChildDeploy" (dict "root" . "group" "airportOps")) -}}
{{- $mc := .Values.global.multicluster -}}

# ── Check-in ──────────────────────────────────────────────────────────────────
{{- if and $isAirportOps (not (and $mc.enabled $isParent)) }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: checkin-v1-deprecation
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      Deprecation: "true"
      Sunset: "Sat, 01 Jan 2028 00:00:00 GMT"
{{- end }}
{{- if $isParent }}
{{- if $mc.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: addprefix-checkin
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  addPrefix:
    prefix: /checkin
{{- end }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: checkin-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
    bundle: airport-ops
spec:
  title: "Check-in API"
  description: "v1 (deprecated) and v2"
  versions:
    - name: checkin-v1
    - name: checkin-v2
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: checkin-v1
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "1.0.0"
  title: "Check-in API v1"
  description: "Legacy — deprecated, migrate to v2 before sunset Jan 2028"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: {{ include "airlines.mc.openApiPath" (dict "root" . "prefix" "checkin" "version" "v1") }}
    operationSets:
      - name: read-checkin
        matchers:
          - methods: ["GET"]
      - name: write-checkin
        matchers:
          - methods: ["POST", "PUT"]
      - name: delete-checkin
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.checkin.apiUrl" . }}/v1
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: checkin-v2
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "2.0.0"
  title: "Check-in API v2"
  description: "Current stable — enforces operation sets"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: {{ include "airlines.mc.openApiPath" (dict "root" . "prefix" "checkin" "version" "v2") }}
    validateRequestMethodAndPath: true
    validateRequestBodySchema: true
    operationSets:
      - name: read-checkin
        matchers:
          - methods: ["GET"]
      - name: write-checkin
        matchers:
          - methods: ["POST", "PUT"]
      - name: delete-checkin
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.checkin.apiUrl" . }}/v2
{{- end }}
{{- if and $mc.enabled (not $isParent) $isAirportOps }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-airport-ops
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /checkin
      - /baggage
      - /gates
{{- end }}
{{- if and $mc.enabled (not $isParent) $isAirportOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: checkin-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
  annotations:
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "airportOps" | quote }}
spec:
  routes:
    - kind: Rule
      match: PathPrefix(`/checkin/v1`)
      middlewares:
        - name: stripprefix-airport-ops
        - name: strip-version-v1
        - name: checkin-v1-deprecation
      services:
        - name: checkin-app
          port: 3000
          passHostHeader: true
    - kind: Rule
      match: PathPrefix(`/checkin/v2`)
      middlewares:
        - name: stripprefix-airport-ops
        - name: strip-version-v2
      services:
        - name: checkin-app
          port: 3000
          passHostHeader: true
{{- else if $isAirportOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: checkin-v1-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
  annotations:
    hub.traefik.io/api-version: checkin-v1
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "airportOps") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.hostMatch" (dict "root" . "prefix" "checkin" "version" "v1") }}
      middlewares:
        {{- if not (and $mc.enabled $isParent) }}
        - name: strip-version-v1
        - name: checkin-v1-deprecation
        {{- end }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "checkin-app" "port" 3000 "group" "airportOps" "haName" "checkin-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: checkin-v2-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: checkin
  annotations:
    hub.traefik.io/api-version: checkin-v2
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "airportOps") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.hostMatch" (dict "root" . "prefix" "checkin" "version" "v2") }}
      {{- if not (and $mc.enabled $isParent) }}
      middlewares:
        - name: strip-version-v2
      {{- end }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "checkin-app" "port" 3000 "group" "airportOps" "haName" "checkin-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
{{- end }}

