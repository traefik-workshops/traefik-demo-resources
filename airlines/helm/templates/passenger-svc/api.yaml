# ── Notifications ─────────────────────────────────────────────────────────────
{{- if $isParent }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: notifications-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: notifications
    bundle: passenger-svc
spec:
  title: "Notifications API"
  description: "Current stable"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: {{ include "airlines.mc.openApiPath" (dict "root" . "prefix" "notifications") }}
    validateRequestMethodAndPath: true
    validateRequestBodySchema: true
    operationSets:
      - name: read-notifications
        matchers:
          - methods: ["GET"]
      - name: write-notifications
        matchers:
          - methods: ["POST", "PUT"]
      - name: delete-notifications
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.notifications.apiUrl" . }}
{{- end }}
{{- if and $mc.enabled (not $isParent) $isPassengerSvc }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notifications-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: notifications
  annotations:
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "passengerSvc" | quote }}
spec:
  routes:
    - kind: Rule
      match: PathPrefix(`/notifications`)
      services:
        - name: notifications-app
          port: 3000
          passHostHeader: true
{{- else if $isPassengerSvc }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notifications-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: notifications
  annotations:
    {{- if $isParent }}
    hub.traefik.io/api: notifications-api
    {{- end }}
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "passengerSvc") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.notifications.hostMatch" . }}
