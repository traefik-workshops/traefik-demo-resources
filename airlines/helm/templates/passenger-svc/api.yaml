{{/*
  Per-API versioning for Passenger Services APIs.
  v1 = deprecated (deprecation headers, operationSets enforced)
  v2 = current (operationSets on APIVersion, enforced via subscriptions)

  Multicluster:
  - Hub API/APIVersion CRDs: parent mode only
  - Deprecation middlewares: always
  - IngressRoutes: parent mode OR child with passengerSvc group enabled
  - coraza-waf middleware in bookings-v2-route: parent only
*/}}
{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isPassengerSvc := or $isParent (include "airlines.mc.isChildDeploy" (dict "root" . "group" "passengerSvc")) -}}
{{- $mc := .Values.multicluster -}}

# ── Bookings ──────────────────────────────────────────────────────────────────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: bookings-v1-deprecation
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      Deprecation: "true"
      Sunset: "Sat, 01 Jan 2028 00:00:00 GMT"
      Link: '<{{ include "airlines.bookings.apiUrl" . }}/v2/bookings>; rel="successor-version"'
{{- if $isParent }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: bookings-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
    bundle: passenger-svc
spec:
  title: "Bookings API"
  description: "v1 (deprecated) and v2 (current, enforces operation sets)"
  versions:
    - name: bookings-v1
    - name: bookings-v2
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: bookings-v1
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "1.0.0"
  title: "Bookings API v1"
  description: "Legacy — deprecated, migrate to v2 before sunset Jan 2028"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-bookings
        matchers:
          - methods: ["GET"]
      - name: write-bookings
        matchers:
          - methods: ["POST", "PUT"]
      - name: delete-bookings
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.bookings.apiUrl" . }}/v1
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: bookings-v2
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "2.0.0"
  title: "Bookings API v2"
  description: "Current stable — enforces operation sets"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-bookings
        matchers:
          - methods: ["GET"]
      - name: write-bookings
        matchers:
          - methods: ["POST", "PUT"]
      - name: delete-bookings
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.bookings.apiUrl" . }}/v2
{{- end }}
{{- if $isPassengerSvc }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bookings-v1-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
  annotations:
    hub.traefik.io/api-version: bookings-v1
    {{- if and $mc.enabled (eq $mc.mode "child") }}
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "passengerSvc" | quote }}
    {{- end }}
spec:
  entryPoints:
    {{- include "airlines.mc.entryPoints" (dict "root" . "group" "passengerSvc") | nindent 4 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.bookings.hostMatch" . }} && PathPrefix(`/v1`)
      middlewares:
        - name: strip-version-v1
        - name: bookings-v1-deprecation
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "bookings-app" "port" 3000 "group" "passengerSvc" "haName" "bookings-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bookings-v2-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
  annotations:
    hub.traefik.io/api-version: bookings-v2
    {{- if and $mc.enabled (eq $mc.mode "child") }}
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "passengerSvc" | quote }}
    {{- end }}
spec:
  entryPoints:
    {{- include "airlines.mc.entryPoints" (dict "root" . "group" "passengerSvc") | nindent 4 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.bookings.hostMatch" . }} && PathPrefix(`/v2`)
      middlewares:
        - name: strip-version-v2
        {{- if $isParent }}
        - name: coraza-waf
        {{- end }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "bookings-app" "port" 3000 "group" "passengerSvc" "haName" "bookings-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
{{- end }}

