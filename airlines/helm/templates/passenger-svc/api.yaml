---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: bookings-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
    bundle: passenger-svc
spec:
  title: "Bookings API"
  description: "Flight reservation management for Traefik Airlines"
  openApiSpec:
    path: /openapi.yaml
    override:
      servers:
        - url: {{ include "airlines.bookings.apiUrl" . }}
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowCredentials: true
    maxAge: 86400
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bookings-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: bookings
  annotations:
    hub.traefik.io/api: bookings-api
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ include "airlines.bookings.hostMatch" . }}
      services:
        - name: bookings-app
          port: 3000
          passHostHeader: true
      observability:
        traceVerbosity: detailed
