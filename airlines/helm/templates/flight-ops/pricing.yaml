{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isDeploy := include "airlines.mc.isLocalDeploy" (dict "root" . "group" "flightOps") -}}
{{- if $isDeploy }}
{{- range $version := list "v1" "v2" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pricing-openapi-{{ $version }}
  labels:
    {{- include "airlines.labels" $ | nindent 4 }}
    component: pricing
    group: flight-ops
    version: {{ $version }}
data:
  openapi.yaml: |
    openapi: "3.0.0"
    info:
      version: 2.0.0
      title: Pricing API
      description: |
        Traefik Airlines Fare Management — pricing rules, cabin classes, and fare calculation.
        Decoupled from the Flights API to demonstrate microservice separation of concerns.
      contact:
        name: Revenue Management Team
        email: revenue@traefik-airlines.io
    servers:
      - url: {{ include "airlines.pricing.apiUrl" $ }}
        description: Pricing API {{ $version }}
    tags:
      - name: pricing
        description: Fare lookup and calculation
      - name: classes
        description: Cabin class information
    paths:
      /{{ $version }}/pricing:
        get:
          summary: List all flight pricing
          description: Returns fare information for all active flights
          operationId: listPricing
          tags: [pricing]
          x-handler: |
            return [
              { flight_id: "TK-1042", route: "JFK \u2192 CDG", currency: "USD", cabins: [{ cabin: "economy", base_fare: 849.00, taxes: 127.35, total: 976.35, seats_available: 120 }, { cabin: "premium-economy", base_fare: 1450.00, taxes: 217.50, total: 1667.50, seats_available: 18 }, { cabin: "business", base_fare: 3200.00, taxes: 480.00, total: 3680.00, seats_available: 4 }], fare_rules: { changeable: true, change_fee: 150.00, refundable: false, baggage_included: 1 } },
              { flight_id: "TK-2187", route: "CDG \u2192 DXB", currency: "USD", cabins: [{ cabin: "economy", base_fare: 720.00, taxes: 108.00, total: 828.00, seats_available: 68 }, { cabin: "premium-economy", base_fare: 1280.00, taxes: 192.00, total: 1472.00, seats_available: 12 }, { cabin: "business", base_fare: 2850.00, taxes: 427.50, total: 3277.50, seats_available: 6 }], fare_rules: { changeable: true, change_fee: 125.00, refundable: false, baggage_included: 1 } },
              { flight_id: "TK-0553", route: "LAX \u2192 HND", currency: "USD", cabins: [{ cabin: "economy", base_fare: 980.00, taxes: 147.00, total: 1127.00, seats_available: 12 }, { cabin: "premium-economy", base_fare: 1650.00, taxes: 247.50, total: 1897.50, seats_available: 5 }, { cabin: "business", base_fare: 3800.00, taxes: 570.00, total: 4370.00, seats_available: 2 }], fare_rules: { changeable: true, change_fee: 200.00, refundable: true, baggage_included: 2 } },
              { flight_id: "TK-0871", route: "SIN \u2192 SYD", currency: "USD", cabins: [{ cabin: "economy", base_fare: 480.00, taxes: 72.00, total: 552.00, seats_available: 34 }, { cabin: "business", base_fare: 1600.00, taxes: 240.00, total: 1840.00, seats_available: 8 }], fare_rules: { changeable: true, change_fee: 100.00, refundable: false, baggage_included: 1 } },
              { flight_id: "TK-1590", route: "FRA \u2192 JFK", currency: "USD", cabins: [{ cabin: "economy", base_fare: 595.00, taxes: 89.25, total: 684.25, seats_available: 87 }, { cabin: "premium-economy", base_fare: 1100.00, taxes: 165.00, total: 1265.00, seats_available: 22 }, { cabin: "business", base_fare: 2650.00, taxes: 397.50, total: 3047.50, seats_available: 10 }], fare_rules: { changeable: true, change_fee: 150.00, refundable: false, baggage_included: 1 } },
              { flight_id: "TK-3321", route: "DXB \u2192 SIN", currency: "USD", cabins: [{ cabin: "economy", base_fare: 620.00, taxes: 93.00, total: 713.00, seats_available: 0 }, { cabin: "business", base_fare: 2200.00, taxes: 330.00, total: 2530.00, seats_available: 0 }], fare_rules: { changeable: false, change_fee: 0, refundable: false, baggage_included: 1 } },
              { flight_id: "TK-4819", route: "ORD \u2192 LHR", currency: "USD", cabins: [{ cabin: "economy", base_fare: 750.00, taxes: 112.50, total: 862.50, seats_available: 56 }, { cabin: "premium-economy", base_fare: 1350.00, taxes: 202.50, total: 1552.50, seats_available: 14 }, { cabin: "business", base_fare: 3100.00, taxes: 465.00, total: 3565.00, seats_available: 7 }], fare_rules: { changeable: true, change_fee: 175.00, refundable: true, baggage_included: 2 } },
              { flight_id: "TK-2044", route: "HND \u2192 CDG", currency: "USD", cabins: [{ cabin: "economy", base_fare: 890.00, taxes: 133.50, total: 1023.50, seats_available: 95 }, { cabin: "premium-economy", base_fare: 1520.00, taxes: 228.00, total: 1748.00, seats_available: 16 }, { cabin: "business", base_fare: 3500.00, taxes: 525.00, total: 4025.00, seats_available: 9 }], fare_rules: { changeable: true, change_fee: 200.00, refundable: false, baggage_included: 2 } }
            ]
          responses:
            "200":
              description: All flight pricing
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlightPricing'
      /{{ $version }}/pricing/calculate:
        post:
          summary: Calculate total fare
          description: Calculate the total price for a booking including taxes, fees, and ancillaries
          operationId: calculateFare
          tags: [pricing]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/FareRequest'
                example:
                  flight_id: "TK-1042"
                  cabin: "economy"
                  passengers: 2
                  extra_baggage: 1
          responses:
            "200":
              description: Calculated fare
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/FareCalculation'
                  example:
                    flight_id: "TK-1042"
                    cabin: "economy"
                    passengers: 2
                    breakdown:
                      base_fare_per_pax: 849.00
                      taxes_per_pax: 127.35
                      subtotal_per_pax: 976.35
                      extra_baggage_fee: 75.00
                    total: 2027.70
                    currency: "USD"
    components:
      schemas:
        FlightPricing:
          type: object
          properties:
            flight_id:
              type: string
              example: "TK-1042"
            route:
              type: string
              example: "JFK → CDG"
            currency:
              type: string
              example: "USD"
            cabins:
              type: array
              items:
                type: object
                properties:
                  cabin:
                    type: string
                  base_fare:
                    type: number
                  taxes:
                    type: number
                  total:
                    type: number
                  seats_available:
                    type: integer
            fare_rules:
              type: object
              properties:
                changeable:
                  type: boolean
                change_fee:
                  type: number
                refundable:
                  type: boolean
                baggage_included:
                  type: integer
        FareRequest:
          type: object
          required: [flight_id, cabin, passengers]
          properties:
            flight_id:
              type: string
            cabin:
              type: string
            passengers:
              type: integer
            extra_baggage:
              type: integer
        FareCalculation:
          type: object
          properties:
            flight_id:
              type: string
            cabin:
              type: string
            passengers:
              type: integer
            breakdown:
              type: object
              properties:
                base_fare_per_pax:
                  type: number
                taxes_per_pax:
                  type: number
                subtotal_per_pax:
                  type: number
                extra_baggage_fee:
                  type: number
            total:
              type: number
            currency:
              type: string
        CabinClass:
          type: object
          properties:
            cabin:
              type: string
            display_name:
              type: string
            baggage_allowance:
              type: string
            seat_pitch:
              type: string
            meal_included:
              type: boolean
            priority_boarding:
              type: boolean

{{- end }}{{/* range versions */}}

{{ include "airlines.flaskService" (dict "root" . "name" "pricing" "versions" (list "v1" "v2")) }}

{{- end }}{{/* $isDeploy */}}
