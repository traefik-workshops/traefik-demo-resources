{{/*
  Per-API versioning for Flight Operations APIs.
  v1 = deprecated (deprecation headers, operationSets enforced)
  v2 = current (operationSets on APIVersion, enforced via subscriptions)

  Correct Hub structure:
  - Parent API: versions refs only, NO openApiSpec, NO cors
  - APIVersion v1: cors + openApiSpec + operationSets
  - APIVersion v2: cors + openApiSpec + operationSets
  - IngressRoutes for versions: ONLY hub.traefik.io/api-version annotation
*/}}

# ── Flights ──────────────────────────────────────────────────────────────────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: flights-v1-deprecation
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      Deprecation: "true"
      Sunset: "Sat, 01 Jan 2028 00:00:00 GMT"
      Link: '<{{ include "airlines.flights.apiUrl" . }}/v2/flights>; rel="successor-version"'
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: flights-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
    bundle: flight-ops
spec:
  title: "Flights API"
  description: "v1 (deprecated) and v2 (current, enforces operation sets)"
  versions:
    - name: flights-v1
    - name: flights-v2
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: flights-v1
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "1.0.0"
  title: "Flights API v1"
  description: "Legacy — deprecated, migrate to v2 before sunset Jan 2028"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-flights
        matchers:
          - methods: ["GET"]
      - name: write-flights
        matchers:
          - methods: ["POST", "PUT", "PATCH"]
      - name: delete-flights
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.flights.apiUrl" . }}/v1
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: flights-v2
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "2.0.0"
  title: "Flights API v2"
  description: "Current stable — enforces operation sets"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-flights
        matchers:
          - methods: ["GET"]
      - name: write-flights
        matchers:
          - methods: ["POST", "PUT", "PATCH"]
      - name: delete-flights
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.flights.apiUrl" . }}/v2
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-v1-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
  annotations:
    hub.traefik.io/api-version: flights-v1
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ include "airlines.flights.hostMatch" . }} && PathPrefix(`/v1`)
      middlewares:
        - name: strip-version-v1
        - name: flights-v1-deprecation
      services:
        - name: flights-app
          port: 3000
          passHostHeader: true
      observability:
        traceVerbosity: detailed
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-v2-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
  annotations:
    hub.traefik.io/api-version: flights-v2
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ include "airlines.flights.hostMatch" . }} && PathPrefix(`/v2`)
      middlewares:
        - name: strip-version-v2
      services:
        - name: flights-app
          port: 3000
          passHostHeader: true
      observability:
        traceVerbosity: detailed

