{{/*
  Per-API versioning for Flight Operations APIs.
  v1 = deprecated (deprecation headers, operationSets enforced)
  v2 = current (operationSets on APIVersion, enforced via subscriptions)

  Correct Hub structure:
  - Parent API: versions refs only, NO openApiSpec, NO cors
  - APIVersion v1: cors + openApiSpec + operationSets
  - APIVersion v2: cors + openApiSpec + operationSets
  - IngressRoutes for versions: ONLY hub.traefik.io/api-version annotation

  Multicluster:
  - Hub API/APIVersion CRDs: parent mode only
  - Deprecation middlewares: always (referenced in IngressRoutes on both parent and child)
  - IngressRoutes: parent mode OR child with flightOps group enabled
*/}}
{{- $isParent := include "airlines.mc.isParentMode" . -}}
{{- $isFlightOps := or $isParent (include "airlines.mc.isChildDeploy" (dict "root" . "group" "flightOps")) -}}
{{- $mc := .Values.multicluster -}}

# ── Flights ──────────────────────────────────────────────────────────────────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: flights-v1-deprecation
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      Deprecation: "true"
      Sunset: "Sat, 01 Jan 2028 00:00:00 GMT"
      Link: '<{{ include "airlines.flights.apiUrl" . }}/v2/flights>; rel="successor-version"'
{{- if $isParent }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: flights-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
    bundle: flight-ops
spec:
  title: "Flights API"
  description: "v1 (deprecated) and v2 (current, enforces operation sets)"
  versions:
    - name: flights-v1
    - name: flights-v2
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: flights-v1
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "1.0.0"
  title: "Flights API v1"
  description: "Legacy — deprecated, migrate to v2 before sunset Jan 2028"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-flights
        matchers:
          - methods: ["GET"]
      - name: write-flights
        matchers:
          - methods: ["POST", "PUT", "PATCH"]
      - name: delete-flights
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.flights.apiUrl" . }}/v1
---
apiVersion: hub.traefik.io/v1alpha1
kind: APIVersion
metadata:
  name: flights-v2
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
spec:
  release: "2.0.0"
  title: "Flights API v2"
  description: "Current stable — enforces operation sets"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: /openapi.yaml
    operationSets:
      - name: read-flights
        matchers:
          - methods: ["GET"]
      - name: write-flights
        matchers:
          - methods: ["POST", "PUT", "PATCH"]
      - name: delete-flights
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.flights.apiUrl" . }}/v2
{{- end }}
{{- if $isFlightOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-v1-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
  annotations:
    hub.traefik.io/api-version: flights-v1
    {{- if and $mc.enabled (eq $mc.mode "child") }}
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "flightOps" | quote }}
    {{- end }}
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "flightOps") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.flights.hostMatch" . }} && PathPrefix(`/v1`)
      middlewares:
        - name: strip-version-v1
        - name: flights-v1-deprecation
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "flights-app" "port" 3000 "group" "flightOps" "haName" "flights-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-v2-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
  annotations:
    hub.traefik.io/api-version: flights-v2
    {{- if and $mc.enabled (eq $mc.mode "child") }}
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "flightOps" | quote }}
    {{- end }}
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "flightOps") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.flights.hostMatch" . }} && PathPrefix(`/v2`)
      middlewares:
        - name: strip-version-v2
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "flights-app" "port" 3000 "group" "flightOps" "haName" "flights-ha") | nindent 8 }}
      {{- if $isParent }}
      observability:
        traceVerbosity: detailed
      {{- end }}
{{- end }}

