# ── Crew ──────────────────────────────────────────────────────────────────────
{{- if $isParent }}
---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: crew-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: crew
    bundle: flight-ops
spec:
  title: "Crew API"
  description: "Current stable"
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    maxAge: 86400
  openApiSpec:
    path: {{ include "airlines.mc.openApiPath" (dict "root" . "prefix" "crew") }}
    validateRequestMethodAndPath: true
    validateRequestBodySchema: true
    operationSets:
      - name: read-crew
        matchers:
          - methods: ["GET"]
      - name: write-crew
        matchers:
          - methods: ["POST", "PUT", "PATCH"]
      - name: delete-crew
        matchers:
          - methods: ["DELETE"]
    override:
      servers:
        - url: {{ include "airlines.crew.apiUrl" . }}
{{- end }}
{{- if and $mc.enabled (not $isParent) $isFlightOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crew-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: crew
  annotations:
    hub.traefik.io/router.uplinks: {{ index $mc.child.uplinkEntryPoints "flightOps" | quote }}
spec:
  routes:
    - kind: Rule
      match: PathPrefix(`/crew`)
      services:
        - name: crew-app
          port: 3000
          passHostHeader: true
{{- else if $isFlightOps }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crew-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: crew
  annotations:
    {{- if $isParent }}
    hub.traefik.io/api: crew-api
    {{- end }}
spec:
  {{- include "airlines.mc.entryPoints" (dict "root" . "group" "flightOps") | nindent 2 }}
  routes:
    - kind: Rule
      match: {{ include "airlines.crew.hostMatch" . }}
      services:
        {{- include "airlines.mc.serviceSpec" (dict "root" . "svcName" "crew-app" "port" 3000 "group" "flightOps" "haName" "") | nindent 8 }}
