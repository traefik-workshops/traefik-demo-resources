---
apiVersion: hub.traefik.io/v1alpha1
kind: API
metadata:
  name: flights-api
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
    bundle: flight-ops
spec:
  title: "Flights API"
  description: "Flight schedules, routes, status, and search for Traefik Airlines"
  openApiSpec:
    path: /openapi.yaml
    override:
      servers:
        - url: {{ include "airlines.flights.apiUrl" . }}
  cors:
    allowHeadersList:
      - "Authorization"
      - "Content-Type"
    allowOriginsList:
      - "*"
    allowMethodsList:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowCredentials: true
    maxAge: 86400
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flights-route
  labels:
    {{- include "airlines.labels" . | nindent 4 }}
    component: flights
  annotations:
    hub.traefik.io/api: flights-api
spec:
  entryPoints:
    {{- range .Values.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ include "airlines.flights.hostMatch" . }}
      services:
        - name: flights-app
          port: 3000
          passHostHeader: true
      observability:
        traceVerbosity: detailed
