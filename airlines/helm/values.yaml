entryPoints:
  - websecure

global:
  domain: demo.traefik.ai

tools-access:
  dashboard:
    token: ""
    group: "tools"
users-access:
  - name: "admin"
    id: ""
    group: "users"

ai-gateway:
  enabled: true

  sharedMiddlewares:
    topicControl:
      enabled: false
      host: topic-control-nim
    contentSafety:
      enabled: false
      host: content-safety-nim
    jailbreakDetection:
      enabled: false
      host: jailbreak-detection-nim
    graniteGuardian:
      enabled: false
      host: granite-guardian
    contentGuard:
      enabled: false
      presidio:
        host: presidio
    semanticCache:
      enabled: false
      tokenizer:
        host: ollama:11434
      vectorDB:
        weaviate:
          host: weaviate:8080

  endpoints:
    - name: gemini
      backend:
        url: generativelanguage.googleapis.com
        isExternal: true
      chatCompletion:
        model: models/gemini-1.5-pro
        params:
          temperature: 1
          maxTokens: 2048
      auth:
        header: Authorization
        value: ""
      routing:
        host: gemini
      api:
        title: "Gemini API"
        description: "Gemini AI Gateway"
        oasUrl: https://raw.githubusercontent.com/traefik-workshops/traefik-airlines/refs/heads/main/oas/openapi.yaml
      middlewares:
        - topicControl
        - contentGuard

    - name: openai
      backend:
        url: api.openai.com
        isExternal: true
      chatCompletion:
        model: gpt-4
        params:
          temperature: 0.7
      auth:
        header: Authorization
        value: ""
      routing:
        host: openai
      api:
        title: "OpenAI API"
        description: "OpenAI AI Gateway"
        oasUrl: https://raw.githubusercontent.com/traefik-workshops/traefik-airlines/refs/heads/main/oas/openapi.yaml
      middlewares:
        - topicControl
        - contentSafety

  presidio:
    enabled: false
    host: presidio

  nims:
    enabled: false

  mcp:
    image:
      repository: python
      tag: "3.11-slim"
      pullPolicy: IfNotPresent

replicaCount: 1

image:
  repository: ghcr.io/traefik-workshops/api-server
  tag: v0.1.0
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

keycloak:
  enabled: false
  realm:
    enabled: true
    name: traefik
    users:
      - admin
      - user
    advancedUsers:
      - username: user-ahv
        email: user-ahv@traefik.io
        password: topsecretpassword
        groups:
          - platform
        claims: {}
      - username: user-nkp
        email: user-nkp@traefik.io
        password: topsecretpassword
        groups:
          - nkp
        claims: {}
    redirectUris: []
  ingress:
    enabled: true
    domain: "{{ .Values.global.domain }}"
    entrypoint: websecure
  ingressInternal:
    enabled: false
  oidc:
    clientId: ""
    clientSecret: ""
    issuerUrl: ""
