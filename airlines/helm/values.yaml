entryPoints:
  - websecure

global:
  domain: demo.traefik.ai

tools-access:
  dashboard:
    token: ""
    group: "tools"

users-access: []

eventServer:
  image: python:3.11-slim

hoppscotch:
  enabled: false
  subdomain: "test"
  image: hoppscotch/hoppscotch:2026.2.0
  jwtSecret: "airlines-demo-jwt-secret-32chars!"
  sessionSecret: "airlines-demo-session-32chars-ok"
  dataEncryptionKey: "airlines-demo-encrypt-32chars-ok"
  collections:
    - name: airlines
      title: "Airlines Demo"
      configMapName: airlines-hoppscotch-collection
      configMapKey: collection.json

keycloak:
  enabled: false
  realm:
    enabled: true
    name: traefik
    # Users always created when keycloak is enabled via this chart
    users:
      - admin
    advancedUsers:
      - username: dispatcher
        email: dispatcher@traefik-airlines.io
        password: topsecretpassword
        groups:
          - flight-ops
        claims: {}
      - username: agent
        email: agent@traefik-airlines.io
        password: topsecretpassword
        groups:
          - passenger-svc
        claims: {}
      - username: handler
        email: handler@traefik-airlines.io
        password: topsecretpassword
        groups:
          - airport-ops
        claims: {}
      - username: analyst
        email: analyst@traefik-airlines.io
        password: topsecretpassword
        groups:
          - demo
        claims: {}
      - username: reader
        email: reader@traefik-airlines.io
        password: topsecretpassword
        groups:
          - reader
        claims: {}
    # Extra users appended to defaults (caller-provided)
    extraUsers: []
    extraAdvancedUsers: []
    extraRedirectUris: []
  ingress:
    enabled: true
    domain: ""
    entrypoint: websecure
  ingressInternal:
    enabled: false
  oidc:
    clientId: ""
    clientSecret: ""
    issuerUrl: ""

multicluster:
  enabled: false
  mode: "parent"          # parent | child

  # Parent mode: cluster provider name per group ("" = deploy locally)
  groups:
    flightOps: ""
    flightOpsMcp: ""
    passengerSvc: ""
    passengerSvcMcp: ""
    airportOps: ""
    airportOpsMcp: ""

  child:
    # Uplink entry point name per group configured on the child cluster.
    # These defaults are shared: parent uses them to construct uplink references
    # (e.g. "flight-ops@nkp-flight-ops"); child uses them for Uplink CRD and
    # router.uplinks annotation.
    uplinkEntryPoints:
      flightOps: "flight-ops"
      flightOpsMcp: "flight-ops-mcp"
      passengerSvc: "passenger-svc"
      passengerSvcMcp: "passenger-svc-mcp"
      airportOps: "airport-ops"
      airportOpsMcp: "airport-ops-mcp"

    # Which groups to deploy on this child cluster (child mode only)
    groups:
      flightOps: false
      flightOpsMcp: false
      passengerSvc: false
      passengerSvcMcp: false
      airportOps: false
      airportOpsMcp: false

    mcp:
      # When true: MCP servers call APIs via internalApiBase rather than
      # in-cluster service names (used when APIs are on a different cluster).
      useInternalApiRouting: false
      internalApiBase: ""    # e.g. "http://traefik.traefik.svc.cluster.local"

    internalApiRouting:
      enabled: false
      entryPoint: "web"
      # Provider names as seen from THIS child's multicluster config
      groups:
        flightOps: ""
        passengerSvc: ""
        airportOps: ""
